<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGLOO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loader">
    <div id="loader-inner">
      <div id="loader-text">--==+==--=</div>
      <div id="loader-bar"><div id="loader-fill"></div></div>
    </div>
  </div>

  <!-- WebGL Canvas -->
  <div id="webgl"></div>

  <!-- Scroll spacer -->
  <div id="scroll-spacer"></div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="ui-top-left">
      <h1 class="logo">IGLOO</h1>
      <p class="meta">// Copyright &copy; 2026</p>
      <p class="meta">Igloo, Inc.<br/>All Rights Reserved.</p>
    </div>

    <div id="ui-top-right">
      <p class="section-label">////// Manifesto</p>
      <p class="manifesto">Our mission is to create the largest onchain community, driving the consumer crypto revolution.</p>
    </div>

    <div id="ui-bottom-left">
      <p class="scroll-hint">Scroll to explore</p>
      <button id="sound-toggle">
        <span id="sound-icon">&#9834;</span> Sound: <span id="sound-state">Off</span>
      </button>
    </div>

    <div id="ui-bottom-right">
      <a href="#" class="nav-link">Twitter</a>
      <a href="#" class="nav-link">Discord</a>
      <a href="#" class="nav-link">About</a>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
